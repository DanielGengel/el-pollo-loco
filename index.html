<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" type="module"></script>
    <title>EL POLLO LOCO</title>
</head>
<body>
    <h1>EL POLLO LOCO</h1>

    <div class="overlayContainer">

        <canvas id="canvas" width="720" height="480"></canvas>

        <!-- START SCREEN -->
        <div id="startScreen" class="overlay active">
            <div class="menu">


                <button id="btnStart">START GAME</button>
                <button id="btnInfo">INFO</button>
                <button id="btnMute">SOUNDS OFF</button>
                <button id="btnImprint">IMPRINT</button>
            </div>
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="gameOverScreen" class="overlay">
            <div class="menu">
                <h2>GAME OVER</h2>

                <button id="btnRestart">PLAY AGAIN</button>
                <button id="btnMenu">MAIN MENU</button>
            </div>
        </div>

        <!-- INFO POPUP -->
        <div id="infoPopup" class="popup hidden">
            <h3>How to Play</h3>

            <p>
                Move with Arrow Keys.<br>
                Jump with SPACE.<br>
                Throw bottles with D.
            </p>

            <button class="closePopup">Close</button>
        </div>

        <!-- IMPRINT POPUP -->
        <div id="imprintPopup" class="popup hidden">
            <h3>Imprint</h3>

            <p>
                 Name<br>
                 Address<br>
                 Email
            </p>

            <button class="closePopup">Close</button>
        </div>

    </div>
</body>
</html>
